<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Para Você, Graça ❤️</title>
<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to right, #ff4e50, #fc913a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

.container {
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 40px;
}

p {
    font-size: 20px;
    margin-top: 20px;
}

.heart {
    font-size: 60px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>
<body>

<div class="container">
    <div class="heart">❤️</div>
    <h1>Para você, Graça Soares</h1>
    <p>
        Desde que você apareceu na minha vida,<br>
        tudo ficou mais bonito.<br><br>
        Eu só queria que você soubesse...<br>
        eu gosto muito de você ❤️
    </p>
</div>

</body>
</html>
